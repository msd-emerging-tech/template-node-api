name: Deploy to Prototype VM

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service name (slug)'
        required: true
      container_port:
        description: 'Container port'
        required: true
        default: '4000'
      healthcheck_path:
        description: 'Health check path'
        required: true
        default: '/health'

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_NAME: ${{ github.event.inputs.service_name }}
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deployment notification
        run: |
          echo "Image pushed: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "Service: ${{ github.event.inputs.service_name }}"
          echo "Port: ${{ github.event.inputs.container_port }}"
          echo "Health: ${{ github.event.inputs.healthcheck_path }}"
